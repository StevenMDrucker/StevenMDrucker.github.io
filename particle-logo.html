<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Logo — Steven M. Drucker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07071a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; cursor: none; }

    #hud {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 28px;
      align-items: flex-end;
      color: rgba(255,255,255,0.3);
      font: 11px/1 monospace;
      user-select: none;
      pointer-events: none;
    }
    #particle-count { color: rgba(255,255,255,0.5); }
    #state-label    { color: rgba(100,200,255,0.5); }

    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 14px 16px;
      color: rgba(255,255,255,0.6);
      font: 11px/1.6 monospace;
      backdrop-filter: blur(8px);
    }
    #controls label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #controls input[type=range] { width: 90px; accent-color: #00d4ff; }
    #controls span.val { width: 32px; text-align: right; color: #00d4ff; }
    #controls h3 {
      color: rgba(255,255,255,0.4);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <span id="particle-count"></span>
  <span id="state-label"></span>
  <span>hover to interact</span>
</div>

<div id="controls">
  <h3>Parameters</h3>
  <label>Repulsion radius <input type="range" id="r-radius" min="40" max="300" value="140"> <span class="val" id="v-radius">140</span></label>
  <label>Repulsion force  <input type="range" id="r-force"  min="1"  max="40"  value="14">  <span class="val" id="v-force">14</span></label>
  <label>Spring stiffness <input type="range" id="r-spring" min="1"  max="20"  value="6">   <span class="val" id="v-spring">6</span></label>
  <label>Damping          <input type="range" id="r-damp"   min="70" max="99"  value="88">  <span class="val" id="v-damp">88</span></label>
  <label>Particle size    <input type="range" id="r-size"   min="10" max="60"  value="28">  <span class="val" id="v-size">28</span></label>
  <label>Sampling         <input type="range" id="r-samp"   min="2"  max="8"   value="4">   <span class="val" id="v-samp">4</span></label>
</div>

<script>
'use strict';

// ── Live parameters ──────────────────────────────────────────────────────────────
const P = {
  text:      'Steven M. Drucker',
  fontSize:  110,
  repRadius: 140,
  repForce:  14,
  springK:   0.06,
  damping:   0.88,
  pointSize: 2.8,
  sampling:  4,
  colorA:    [0.0,  0.84, 1.0,  1.0],   // cyan
  colorB:    [0.72, 0.15, 1.0,  1.0],   // violet
  bgColor:   [0.027, 0.027, 0.102, 1.0],
};

function wire(id, valId, prop, scale, rebuild) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = Number(sl.value);
    vl.textContent = v;
    P[prop] = v * scale;
    if (rebuild) scheduleRebuild();
  });
}
wire('r-radius', 'v-radius', 'repRadius', 1,    false);
wire('r-force',  'v-force',  'repForce',  1,    false);
wire('r-spring', 'v-spring', 'springK',   0.01, false);
wire('r-damp',   'v-damp',   'damping',   0.01, false);
wire('r-size',   'v-size',   'pointSize', 0.1,  false);
wire('r-samp',   'v-samp',   'sampling',  1,    true);

// ── WebGL setup ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:red;padding:2rem">WebGL not supported</p>'; }

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

const VS = `
  attribute vec2  a_pos;
  attribute vec4  a_col;
  uniform   vec2  u_res;
  uniform   float u_ps;
  varying   vec4  v_col;
  void main() {
    vec2 clip = (a_pos / u_res) * 2.0 - 1.0;
    gl_Position  = vec4(clip.x, -clip.y, 0.0, 1.0);
    gl_PointSize = u_ps;
    v_col = a_col;
  }
`;
const FS = `
  precision mediump float;
  varying vec4 v_col;
  void main() {
    vec2  c = gl_PointCoord - 0.5;
    float d = dot(c, c);
    if (d > 0.25) discard;
    float a = 1.0 - smoothstep(0.12, 0.25, d);
    gl_FragColor = vec4(v_col.rgb, v_col.a * a);
  }
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const loc = {
  pos: gl.getAttribLocation(prog,  'a_pos'),
  col: gl.getAttribLocation(prog,  'a_col'),
  res: gl.getUniformLocation(prog, 'u_res'),
  ps:  gl.getUniformLocation(prog, 'u_ps'),
};
const posBuf = gl.createBuffer();
const colBuf = gl.createBuffer();

// ── Particle arrays ──────────────────────────────────────────────────────────────
let N = 0;
let homeX, homeY;      // text formation positions
let scatterX, scatterY; // random scatter positions
let curX,  curY;
let velX,  velY;
let posArr, colArr;
let staggerDelay;      // Float32Array, per-particle ms delay for current transition

// ── Idle state machine ───────────────────────────────────────────────────────────
const S = { SCATTERED: 0, FORMING: 1, FORMED: 2, SCATTERING: 3 };
const S_LABEL = ['scattered', 'forming…', 'formed', 'scattering…'];

const HOLD_SCATTERED_MS = 1200;
const HOLD_FORMED_MS    = 2200;
const MAX_STAGGER_MS    = 650;   // time spread between first and last particle moving
const FORM_SETTLE_MS    = 2200;  // spring settle time after stagger starts
const SCATTER_SETTLE_MS = 1800;

let idleState     = S.SCATTERED;
let stateStart    = 0;   // performance.now() of last state entry
let mouseActive   = false;

// ── Scatter position generation ──────────────────────────────────────────────────
function generateScatter() {
  // Confine scatter to just beyond the text bounding box so the logo stays compact
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (let i = 0; i < N; i++) {
    if (homeX[i] < minX) minX = homeX[i]; if (homeX[i] > maxX) maxX = homeX[i];
    if (homeY[i] < minY) minY = homeY[i]; if (homeY[i] > maxY) maxY = homeY[i];
  }
  const tw = maxX - minX, th = maxY - minY;
  const padX = tw * 0.12;   // 12% extra width each side
  const padY = th * 0.55;   // 55% extra height each side (text is short, give vertical room)
  const x0 = minX - padX, xW = tw + padX * 2;
  const y0 = minY - padY, yH = th + padY * 2;
  for (let i = 0; i < N; i++) {
    scatterX[i] = x0 + Math.random() * xW;
    scatterY[i] = y0 + Math.random() * yH;
  }
}

// ── Transition launcher ──────────────────────────────────────────────────────────
function enterState(s, W, H) {
  idleState  = s;
  stateStart = performance.now();
  document.getElementById('state-label').textContent = S_LABEL[s];

  if (s === S.FORMING) {
    // Left-to-right sweep: stagger by homeX position
    let minHX = Infinity, maxHX = -Infinity;
    for (let i = 0; i < N; i++) { minHX = Math.min(minHX, homeX[i]); maxHX = Math.max(maxHX, homeX[i]); }
    const hRange = maxHX - minHX || 1;
    for (let i = 0; i < N; i++) {
      staggerDelay[i] = ((homeX[i] - minHX) / hRange) * MAX_STAGGER_MS;
    }
  } else if (s === S.SCATTERING) {
    // New random destinations each cycle
    generateScatter();
    // Stagger: particles furthest from home x-center scatter first (wave outward)
    let minHX = Infinity, maxHX = -Infinity;
    for (let i = 0; i < N; i++) { minHX = Math.min(minHX, homeX[i]); maxHX = Math.max(maxHX, homeX[i]); }
    const cx = (minHX + maxHX) / 2;
    let maxDist = 0;
    for (let i = 0; i < N; i++) { maxDist = Math.max(maxDist, Math.abs(homeX[i] - cx)); }
    const distRange = maxDist || 1;
    for (let i = 0; i < N; i++) {
      // add small random jitter so particles at same x don't all fire at once
      const t = Math.abs(homeX[i] - cx) / distRange;
      staggerDelay[i] = (1 - t) * MAX_STAGGER_MS + Math.random() * 80;
    }
  }
}

// ── Build particles from text rasterization ──────────────────────────────────────
function buildParticles(W, H) {
  const { text, fontSize, sampling, colorA, colorB } = P;

  const off = document.createElement('canvas');
  const ctx = off.getContext('2d');
  ctx.font = `bold ${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
  const tw = ctx.measureText(text).width;
  const th = fontSize * 1.5;
  off.width  = Math.ceil(tw) + fontSize * 0.6;
  off.height = Math.ceil(th);
  ctx.font = `bold ${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, fontSize * 0.3, th / 2);

  const { data } = ctx.getImageData(0, 0, off.width, off.height);
  const ox = (W - off.width)  / 2;
  const oy = (H - off.height) / 2;

  const pts = [];
  for (let py = 0; py < off.height; py += sampling) {
    for (let px = 0; px < off.width; px += sampling) {
      if (data[(py * off.width + px) * 4 + 3] > 80) {
        pts.push(px + ox, py + oy);
      }
    }
  }

  N = pts.length >> 1;
  homeX      = new Float32Array(N);
  homeY      = new Float32Array(N);
  scatterX   = new Float32Array(N);
  scatterY   = new Float32Array(N);
  curX       = new Float32Array(N);
  curY       = new Float32Array(N);
  velX       = new Float32Array(N);
  velY       = new Float32Array(N);
  posArr     = new Float32Array(N * 2);
  colArr     = new Float32Array(N * 4);
  staggerDelay = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    homeX[i] = pts[i * 2];
    homeY[i] = pts[i * 2 + 1];
  }

  // Initial positions: burst in from random angles (first-load effect)
  const cx = W / 2, cy = H / 2;
  for (let i = 0; i < N; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = 60 + Math.random() * Math.max(W, H) * 0.4;
    curX[i] = cx + Math.cos(angle) * dist;
    curY[i] = cy + Math.sin(angle) * dist;
    velX[i] = velY[i] = 0;
  }

  // Per-particle colors: left→right gradient
  let minHX = Infinity, maxHX = -Infinity;
  for (let i = 0; i < N; i++) { minHX = Math.min(minHX, homeX[i]); maxHX = Math.max(maxHX, homeX[i]); }
  const hRange = maxHX - minHX || 1;
  for (let i = 0; i < N; i++) {
    const t = (homeX[i] - minHX) / hRange;
    colArr[i*4+0] = colorA[0] + (colorB[0] - colorA[0]) * t;
    colArr[i*4+1] = colorA[1] + (colorB[1] - colorA[1]) * t;
    colArr[i*4+2] = colorA[2] + (colorB[2] - colorA[2]) * t;
    colArr[i*4+3] = 1.0;
  }

  gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
  gl.bufferData(gl.ARRAY_BUFFER, colArr, gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, posArr, gl.DYNAMIC_DRAW);

  // Start by holding scattered, then form
  generateScatter(W, H);
  for (let i = 0; i < N; i++) { curX[i] = scatterX[i]; curY[i] = scatterY[i]; }
  enterState(S.SCATTERED, W, H);

  document.getElementById('particle-count').textContent = `${N.toLocaleString()} particles`;
}

// ── Resize ───────────────────────────────────────────────────────────────────────
let W = 0, H = 0;
let needsRebuild = false;
function scheduleRebuild() { needsRebuild = true; }

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width        = Math.round(W * dpr);
  canvas.height       = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform2f(loc.res, W, H);
  buildParticles(W, H);
}
window.addEventListener('resize', resize);

// ── Mouse / touch ─────────────────────────────────────────────────────────────────
let mx = -99999, my = -99999;

canvas.addEventListener('mouseenter', () => {
  mouseActive = true;
  document.getElementById('state-label').textContent = 'interactive';
});
canvas.addEventListener('mouseleave', () => {
  mouseActive = false;
  mx = my = -99999;
  // After mouse leaves, hold formed briefly then resume idle cycle
  enterState(S.FORMED, W, H);
});
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseActive = true;
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchend', () => {
  mouseActive = false;
  mx = my = -99999;
  enterState(S.FORMED, W, H);
});

// ── Animation loop ───────────────────────────────────────────────────────────────
function frame() {
  requestAnimationFrame(frame);

  if (needsRebuild) { needsRebuild = false; buildParticles(W, H); }

  const now = performance.now();
  const { repRadius, repForce, springK, damping, pointSize, bgColor } = P;
  const dpr = window.devicePixelRatio || 1;
  const r2  = repRadius * repRadius;

  // ── State machine (only advances when mouse is not active) ───────────────────
  if (!mouseActive) {
    const elapsed = now - stateStart;
    switch (idleState) {
      case S.SCATTERED:
        if (elapsed > HOLD_SCATTERED_MS)
          enterState(S.FORMING, W, H);
        break;
      case S.FORMING:
        if (elapsed > MAX_STAGGER_MS + FORM_SETTLE_MS)
          enterState(S.FORMED, W, H);
        break;
      case S.FORMED:
        if (elapsed > HOLD_FORMED_MS)
          enterState(S.SCATTERING, W, H);
        break;
      case S.SCATTERING:
        if (elapsed > MAX_STAGGER_MS + SCATTER_SETTLE_MS)
          enterState(S.SCATTERED, W, H);
        break;
    }
  }

  // ── Physics ───────────────────────────────────────────────────────────────────
  const elapsed = now - stateStart;

  for (let i = 0; i < N; i++) {
    let vx = velX[i], vy = velY[i];
    let x  = curX[i], y  = curY[i];

    if (mouseActive) {
      // Interactive: spring to home + mouse repulsion
      vx += (homeX[i] - x) * springK;
      vy += (homeY[i] - y) * springK;

      const dx = x - mx, dy = y - my;
      const d2 = dx*dx + dy*dy;
      if (d2 < r2 && d2 > 0.01) {
        const d = Math.sqrt(d2);
        const f = (1.0 - d / repRadius) * repForce;
        vx += (dx / d) * f;
        vy += (dy / d) * f;
      }
    } else {
      // Idle: spring toward current state target, gated by per-particle stagger delay
      const active = (idleState === S.FORMED || idleState === S.SCATTERED)
                     || (elapsed >= staggerDelay[i]);

      if (active) {
        let tx, ty;
        if (idleState === S.FORMING || idleState === S.FORMED) {
          tx = homeX[i]; ty = homeY[i];
        } else {
          tx = scatterX[i]; ty = scatterY[i];
        }
        vx += (tx - x) * springK;
        vy += (ty - y) * springK;
      }
      // gentle drift while waiting for stagger (no hard stop)
    }

    vx *= damping;
    vy *= damping;
    x  += vx;
    y  += vy;

    velX[i] = vx; velY[i] = vy;
    curX[i] = x;  curY[i] = y;
    posArr[i*2]   = x;
    posArr[i*2+1] = y;
  }

  // ── Upload & draw ─────────────────────────────────────────────────────────────
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, posArr);

  gl.uniform1f(loc.ps, pointSize * dpr);

  const [r, g, b, a] = bgColor;
  gl.clearColor(r, g, b, a);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.enableVertexAttribArray(loc.pos);
  gl.vertexAttribPointer(loc.pos, 2, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
  gl.enableVertexAttribArray(loc.col);
  gl.vertexAttribPointer(loc.col, 4, gl.FLOAT, false, 0, 0);

  gl.drawArrays(gl.POINTS, 0, N);
}

// ── Boot ─────────────────────────────────────────────────────────────────────────
resize();
frame();
</script>
</body>
</html>
